<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Portfolio Tracker</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 24px;
    }

    h1 {
      margin-bottom: 8px;
    }

    h3 {
      margin-top: 0;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 24px;
    }

    .card {
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #020617;
      color: #e5e7eb;
      min-width: 160px;
    }

    button {
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #1d4ed8;
    }

    button.secondary {
      background: #475569;
    }

    button.secondary:hover {
      background: #334155;
    }

    button.danger {
      background: #dc2626;
    }

    button.danger:hover {
      background: #b91c1c;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid #1e293b;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #020617;
      min-width: 1200px;
    }

    th,
    td {
      padding: 12px;
      border-bottom: 1px solid #1e293b;
      text-align: left;
      font-size: 14px;
      white-space: nowrap;
    }

    th {
      background: #1e293b;
      color: #cbd5e1;
    }

    tr:hover {
      background: #111827;
    }

    .ok {
      color: #22c55e;
      font-weight: bold;
    }

    .warn {
      color: #facc15;
      font-weight: bold;
    }

    .bad {
      color: #ef4444;
      font-weight: bold;
    }

    .small {
      color: #94a3b8;
      font-size: 12px;
    }

    pre {
      white-space: pre-wrap;
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 12px;
      color: #cbd5e1;
      overflow-x: auto;
      max-height: 350px;
    }
  </style>
</head>

<body>
  <h1>Portfolio Tracker</h1>

  <div class="subtitle">
    Dynamic holdings + Cloudflare Worker + EODHD foreign stock symbol mapping.
  </div>

  <div class="card">
    <h3>Add / Update Holding</h3>

    <div class="controls">
      <input id="holdingSymbol" placeholder="Symbol e.g. AIXA.DE" />
      <input id="holdingShares" placeholder="Shares e.g. 33" type="number" step="0.0001" />
      <input id="holdingAvgCost" placeholder="Avg cost e.g. 73.70" type="number" step="0.01" />

      <button onclick="addHolding()">Add / Update</button>
      <button class="secondary" onclick="loadDynamicPortfolio()">Refresh Prices</button>
      <button class="danger" onclick="clearHoldings()">Clear Holdings</button>
      <button class="secondary" onclick="clearSymbolCache()">Clear Symbol Cache</button>
    </div>

    <p class="small">
      Worker:
      <span id="workerUrl"></span>
    </p>
  </div>

  <div class="card">
    <h3>Quick Symbol Test</h3>

    <div class="controls">
      <input id="symbolInput" placeholder="Example: AIXA.DE" value="AIXA.DE" />
      <button onclick="testSingleSymbol()">Test Symbol</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Original Symbol</th>
          <th>Resolved Symbol</th>
          <th>Shares</th>
          <th>Avg Cost</th>
          <th>Price</th>
          <th>Market Value</th>
          <th>Cost Value</th>
          <th>P&amp;L</th>
          <th>Return</th>
          <th>Currency</th>
          <th>Source</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="portfolioBody">
        <tr>
          <td colspan="13" class="small">No holdings added yet.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <h3>Debug Log</h3>
  <pre id="debugLog"></pre>

  <script>
    /************************************************************
     * CONFIG
     ************************************************************/

    const WORKER_BASE = "https://lively-dew-5c3c.davidtrix7.workers.dev";

    document.getElementById("workerUrl").textContent = WORKER_BASE;

    let portfolioHoldings = loadHoldingsFromStorage();

    /************************************************************
     * BASIC HELPERS
     ************************************************************/

    function logDebug(message, data = null) {
      const debug = document.getElementById("debugLog");
      const line = `[${new Date().toLocaleTimeString()}] ${message}`;

      if (data) {
        debug.textContent += line + "\n" + JSON.stringify(data, null, 2) + "\n\n";
      } else {
        debug.textContent += line + "\n";
      }

      debug.scrollTop = debug.scrollHeight;
    }

    function clearDebug() {
      document.getElementById("debugLog").textContent = "";
    }

    function normaliseSymbol(symbol) {
      return String(symbol || "").trim().toUpperCase();
    }

    function getTickerRoot(symbol) {
      return normaliseSymbol(symbol).split(".")[0];
    }

    function formatMoney(value) {
      if (value === null || value === undefined || !Number.isFinite(Number(value))) {
        return "—";
      }

      return Number(value).toFixed(2);
    }

    function formatPrice(value) {
      if (value === null || value === undefined || !Number.isFinite(Number(value))) {
        return "—";
      }

      return Number(value).toFixed(4);
    }

    function formatPercent(value) {
      if (value === null || value === undefined || !Number.isFinite(Number(value))) {
        return "—";
      }

      return `${Number(value).toFixed(2)}%`;
    }

    function getExchangeHint(symbol) {
      const s = normaliseSymbol(symbol);

      if (s.endsWith(".DE")) return ["XETRA", "F"];
      if (s.endsWith(".L")) return ["LSE"];
      if (s.endsWith(".PA")) return ["PA"];
      if (s.endsWith(".AS")) return ["AS"];
      if (s.endsWith(".SW")) return ["SW"];
      if (s.endsWith(".TO")) return ["TO"];
      if (s.endsWith(".V")) return ["V"];
      if (s.endsWith(".T")) return ["TSE", "T"];
      if (s.endsWith(".HK")) return ["HK"];
      if (s.endsWith(".AX")) return ["AU", "AX"];

      return [];
    }

    function getPriceFromQuote(data) {
      if (!data || typeof data !== "object") return null;

      const value =
        data.close ??
        data.price ??
        data.adjusted_close ??
        data.adjustedClose ??
        data.previousClose ??
        data.last ??
        data.value ??
        null;

      const numberValue = Number(value);

      if (!Number.isFinite(numberValue) || numberValue <= 0) {
        return null;
      }

      return numberValue;
    }

    function looksLikeValidQuote(data) {
      return getPriceFromQuote(data) !== null;
    }

    function getCurrencyFromQuote(data) {
      return (
        data?.currency ??
        data?.Currency ??
        data?.currencyCode ??
        data?.CurrencyCode ??
        "—"
      );
    }

    /************************************************************
     * HOLDINGS STORAGE
     ************************************************************/

    function loadHoldingsFromStorage() {
      try {
        return JSON.parse(localStorage.getItem("portfolioHoldings") || "[]");
      } catch {
        return [];
      }
    }

    function saveHoldingsToStorage() {
      localStorage.setItem("portfolioHoldings", JSON.stringify(portfolioHoldings));
    }

    function addHolding() {
      const symbol = normaliseSymbol(document.getElementById("holdingSymbol").value);
      const shares = Number(document.getElementById("holdingShares").value);
      const avgCost = Number(document.getElementById("holdingAvgCost").value);

      if (!symbol) {
        alert("Enter a symbol.");
        return;
      }

      if (!Number.isFinite(shares) || shares <= 0) {
        alert("Enter valid shares.");
        return;
      }

      if (!Number.isFinite(avgCost) || avgCost < 0) {
        alert("Enter valid average cost.");
        return;
      }

      const existing = portfolioHoldings.find(
        h => normaliseSymbol(h.symbol) === symbol
      );

      if (existing) {
        existing.shares = shares;
        existing.avgCost = avgCost;
      } else {
        portfolioHoldings.push({
          symbol,
          shares,
          avgCost
        });
      }

      saveHoldingsToStorage();

      document.getElementById("holdingSymbol").value = "";
      document.getElementById("holdingShares").value = "";
      document.getElementById("holdingAvgCost").value = "";

      loadDynamicPortfolio();
    }

    function clearHoldings() {
      portfolioHoldings = [];
      saveHoldingsToStorage();
      renderRows([]);
      clearDebug();
      logDebug("All holdings cleared.");
    }

    function removeHolding(symbol) {
      portfolioHoldings = portfolioHoldings.filter(
        h => normaliseSymbol(h.symbol) !== normaliseSymbol(symbol)
      );

      saveHoldingsToStorage();
      loadDynamicPortfolio();
    }

    /************************************************************
     * SYMBOL CACHE
     ************************************************************/

    function getSymbolCache() {
      try {
        return JSON.parse(localStorage.getItem("symbolMapCache") || "{}");
      } catch {
        return {};
      }
    }

    function saveSymbolCache(cache) {
      localStorage.setItem("symbolMapCache", JSON.stringify(cache));
    }

    function getCachedSymbol(originalSymbol) {
      const cache = getSymbolCache();
      return cache[normaliseSymbol(originalSymbol)] || null;
    }

    function setCachedSymbol(originalSymbol, mappedSymbol) {
      const cache = getSymbolCache();
      cache[normaliseSymbol(originalSymbol)] = normaliseSymbol(mappedSymbol);
      saveSymbolCache(cache);
    }

    function clearSymbolCache() {
      localStorage.removeItem("symbolMapCache");
      clearDebug();
      logDebug("Symbol mapping cache cleared.");
    }

    /************************************************************
     * WORKER API CALLS
     ************************************************************/

    async function fetchWorkerJson(path) {
      const url = `${WORKER_BASE}${path}`;

      logDebug(`Fetching: ${url}`);

      const res = await fetch(url);

      if (!res.ok) {
        throw new Error(`HTTP ${res.status} from ${url}`);
      }

      return await res.json();
    }

    async function fetchQuote(symbol) {
      const cleanSymbol = normaliseSymbol(symbol);

      return await fetchWorkerJson(
        `/quote?symbol=${encodeURIComponent(cleanSymbol)}`
      );
    }

    async function fetchEod(symbol) {
      const cleanSymbol = normaliseSymbol(symbol);

      return await fetchWorkerJson(
        `/eod?symbol=${encodeURIComponent(cleanSymbol)}`
      );
    }

    async function searchSymbol(query) {
      const cleanQuery = normaliseSymbol(query);

      return await fetchWorkerJson(
        `/search?q=${encodeURIComponent(cleanQuery)}`
      );
    }

    /************************************************************
     * SEARCH RESULT NORMALISATION
     ************************************************************/

    function extractSearchArray(searchResults) {
      if (Array.isArray(searchResults)) {
        return searchResults;
      }

      if (Array.isArray(searchResults?.data)) {
        return searchResults.data;
      }

      if (Array.isArray(searchResults?.results)) {
        return searchResults.results;
      }

      return [];
    }

    function normaliseSearchResult(item) {
      const code = normaliseSymbol(
        item.Code ??
        item.code ??
        item.Symbol ??
        item.symbol ??
        ""
      );

      const exchange = normaliseSymbol(
        item.Exchange ??
        item.exchange ??
        item.ExchangeCode ??
        item.exchangeCode ??
        ""
      );

      const ticker = normaliseSymbol(
        item.Ticker ??
        item.ticker ??
        code
      );

      const name = String(
        item.Name ??
        item.name ??
        item.Description ??
        item.description ??
        ""
      ).toUpperCase();

      const country = String(
        item.Country ??
        item.country ??
        ""
      ).toUpperCase();

      const type = String(
        item.Type ??
        item.type ??
        ""
      ).toUpperCase();

      let eodhdSymbol = code;

      if (code && exchange) {
        eodhdSymbol = `${code}.${exchange}`;
      }

      return {
        raw: item,
        code,
        exchange,
        ticker,
        name,
        country,
        type,
        eodhdSymbol
      };
    }

    function pickBestEodhdSymbol(originalSymbol, searchResults) {
      const original = normaliseSymbol(originalSymbol);
      const root = getTickerRoot(original);
      const exchangeHints = getExchangeHint(original);

      const results = extractSearchArray(searchResults)
        .map(normaliseSearchResult)
        .filter(x => x.code || x.eodhdSymbol);

      if (results.length === 0) {
        return null;
      }

      logDebug(`Search candidates for ${original}`, results);

      // 1. Exact EODHD symbol match
      let best = results.find(x => x.eodhdSymbol === original);
      if (best) return best.eodhdSymbol;

      // 2. Same ticker root + expected exchange
      best = results.find(x =>
        x.code === root &&
        exchangeHints.some(hint => x.exchange === hint)
      );
      if (best) return best.eodhdSymbol;

      // 3. Same ticker root + exchange contains expected hint
      best = results.find(x =>
        x.code === root &&
        exchangeHints.some(hint => x.exchange.includes(hint))
      );
      if (best) return best.eodhdSymbol;

      // 4. Same ticker root, prefer common exchanges
      const preferredExchanges = [
        "XETRA",
        "LSE",
        "TSE",
        "HK",
        "SW",
        "PA",
        "AS",
        "TO",
        "AU",
        "AX",
        "F"
      ];

      best = results.find(x =>
        x.code === root &&
        preferredExchanges.includes(x.exchange)
      );
      if (best) return best.eodhdSymbol;

      // 5. Same ticker root, any exchange
      best = results.find(x => x.code === root);
      if (best) return best.eodhdSymbol;

      // 6. Same ticker field
      best = results.find(x => x.ticker === root);
      if (best) return best.eodhdSymbol;

      // 7. Final fallback
      return results[0]?.eodhdSymbol || null;
    }

    /************************************************************
     * SMART SYMBOL RESOLVER
     ************************************************************/

    async function resolveForeignSymbol(originalSymbol) {
      const cleanOriginal = normaliseSymbol(originalSymbol);

      if (!cleanOriginal) {
        return null;
      }

      // 1. Use cached mapping first
      const cached = getCachedSymbol(cleanOriginal);

      if (cached) {
        logDebug(`Using cached mapping: ${cleanOriginal} → ${cached}`);

        return {
          originalSymbol: cleanOriginal,
          resolvedSymbol: cached,
          source: "cache"
        };
      }

      // 2. Try original symbol directly
      try {
        const directQuote = await fetchQuote(cleanOriginal);

        if (looksLikeValidQuote(directQuote)) {
          setCachedSymbol(cleanOriginal, cleanOriginal);

          logDebug(`Direct symbol worked: ${cleanOriginal}`, directQuote);

          return {
            originalSymbol: cleanOriginal,
            resolvedSymbol: cleanOriginal,
            source: "direct"
          };
        }

        logDebug(`Direct symbol gave invalid quote: ${cleanOriginal}`, directQuote);
      } catch (err) {
        logDebug(`Direct quote failed for ${cleanOriginal}: ${err.message}`);
      }

      // 3. Search using ticker root
      const root = getTickerRoot(cleanOriginal);

      try {
        const searchResults = await searchSymbol(root);
        const mappedSymbol = pickBestEodhdSymbol(cleanOriginal, searchResults);

        if (!mappedSymbol) {
          logDebug(`No mapping found for ${cleanOriginal}. Using original.`);

          return {
            originalSymbol: cleanOriginal,
            resolvedSymbol: cleanOriginal,
            source: "fallback-original"
          };
        }

        // 4. Confirm mapped symbol works
        const mappedQuote = await fetchQuote(mappedSymbol);

        if (looksLikeValidQuote(mappedQuote)) {
          setCachedSymbol(cleanOriginal, mappedSymbol);

          logDebug(
            `Mapped symbol confirmed: ${cleanOriginal} → ${mappedSymbol}`,
            mappedQuote
          );

          return {
            originalSymbol: cleanOriginal,
            resolvedSymbol: mappedSymbol,
            source: "search-confirmed"
          };
        }

        logDebug(`Mapped symbol did not return valid quote: ${mappedSymbol}`, mappedQuote);

        return {
          originalSymbol: cleanOriginal,
          resolvedSymbol: cleanOriginal,
          source: "fallback-original"
        };
      } catch (err) {
        logDebug(`Symbol resolve failed for ${cleanOriginal}: ${err.message}`);

        return {
          originalSymbol: cleanOriginal,
          resolvedSymbol: cleanOriginal,
          source: "fallback-error"
        };
      }
    }

    /************************************************************
     * SMART QUOTE
     ************************************************************/

    async function getSmartQuote(originalSymbol) {
      const resolution = await resolveForeignSymbol(originalSymbol);

      if (!resolution?.resolvedSymbol) {
        throw new Error(`Could not resolve symbol: ${originalSymbol}`);
      }

      const quote = await fetchQuote(resolution.resolvedSymbol);

      return {
        originalSymbol: resolution.originalSymbol,
        resolvedSymbol: resolution.resolvedSymbol,
        source: resolution.source,
        quote,
        price: getPriceFromQuote(quote),
        currency: getCurrencyFromQuote(quote)
      };
    }

    /************************************************************
     * TABLE RENDERING
     ************************************************************/

    function setLoadingRow(message) {
      const tbody = document.getElementById("portfolioBody");

      tbody.innerHTML = `
        <tr>
          <td colspan="13" class="small">${message}</td>
        </tr>
      `;
    }

    function renderRows(rows) {
      const tbody = document.getElementById("portfolioBody");

      if (!rows.length) {
        tbody.innerHTML = `
          <tr>
            <td colspan="13" class="small">No holdings added yet.</td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = rows.map(row => {
        const statusClass = row.ok ? "ok" : "bad";

        const pnlClass =
          row.pnl > 0 ? "ok" :
          row.pnl < 0 ? "bad" :
          "";

        return `
          <tr>
            <td>${row.originalSymbol}</td>
            <td>${row.resolvedSymbol || "—"}</td>
            <td>${row.shares ?? "—"}</td>
            <td>${formatMoney(row.avgCost)}</td>
            <td>${formatPrice(row.price)}</td>
            <td>${formatMoney(row.marketValue)}</td>
            <td>${formatMoney(row.costValue)}</td>
            <td class="${pnlClass}">${formatMoney(row.pnl)}</td>
            <td class="${pnlClass}">${formatPercent(row.returnPct)}</td>
            <td>${row.currency || "—"}</td>
            <td>${row.source || "—"}</td>
            <td class="${statusClass}">${row.status}</td>
            <td>
              <button class="danger" onclick="removeHolding('${row.originalSymbol}')">
                Remove
              </button>
            </td>
          </tr>
        `;
      }).join("");
    }

    /************************************************************
     * UI ACTIONS
     ************************************************************/

    async function testSingleSymbol() {
      clearDebug();

      const input = document.getElementById("symbolInput");
      const symbol = normaliseSymbol(input.value);

      if (!symbol) {
        alert("Enter a symbol first.");
        return;
      }

      setLoadingRow(`Testing ${symbol}...`);

      try {
        const result = await getSmartQuote(symbol);

        renderRows([
          {
            originalSymbol: result.originalSymbol,
            resolvedSymbol: result.resolvedSymbol,
            shares: "—",
            avgCost: null,
            price: result.price,
            marketValue: null,
            costValue: null,
            pnl: null,
            returnPct: null,
            currency: result.currency,
            source: result.source,
            ok: result.price !== null,
            status: result.price !== null ? "OK" : "No valid price"
          }
        ]);

        logDebug("Final result", result);
      } catch (err) {
        renderRows([
          {
            originalSymbol: symbol,
            resolvedSymbol: "—",
            shares: "—",
            avgCost: null,
            price: null,
            marketValue: null,
            costValue: null,
            pnl: null,
            returnPct: null,
            currency: "—",
            source: "error",
            ok: false,
            status: err.message
          }
        ]);

        logDebug(`Error: ${err.message}`);
      }
    }

    async function loadDynamicPortfolio() {
      clearDebug();

      portfolioHoldings = loadHoldingsFromStorage();

      if (!portfolioHoldings.length) {
        setLoadingRow("No holdings added yet.");
        return;
      }

      setLoadingRow("Loading portfolio prices...");

      const rows = [];

      for (const holding of portfolioHoldings) {
        try {
          const result = await getSmartQuote(holding.symbol);

          const price = result.price;
          const shares = Number(holding.shares);
          const avgCost = Number(holding.avgCost);

          const marketValue =
            price !== null
              ? price * shares
              : null;

          const costValue =
            Number.isFinite(avgCost) && Number.isFinite(shares)
              ? avgCost * shares
              : null;

          const pnl =
            marketValue !== null && costValue !== null
              ? marketValue - costValue
              : null;

          const returnPct =
            pnl !== null && costValue > 0
              ? (pnl / costValue) * 100
              : null;

          rows.push({
            originalSymbol: result.originalSymbol,
            resolvedSymbol: result.resolvedSymbol,
            shares,
            avgCost,
            price,
            marketValue,
            costValue,
            pnl,
            returnPct,
            currency: result.currency,
            source: result.source,
            ok: price !== null,
            status: price !== null ? "OK" : "No valid price"
          });
        } catch (err) {
          const shares = Number(holding.shares);
          const avgCost = Number(holding.avgCost);
          const costValue = shares * avgCost;

          rows.push({
            originalSymbol: holding.symbol,
            resolvedSymbol: "—",
            shares,
            avgCost,
            price: null,
            marketValue: null,
            costValue,
            pnl: null,
            returnPct: null,
            currency: "—",
            source: "error",
            ok: false,
            status: err.message
          });
        }

        renderRows(rows);
      }

      logDebug("Dynamic portfolio load finished.");
    }

    /************************************************************
     * AUTO LOAD ON PAGE OPEN
     ************************************************************/

    window.addEventListener("load", () => {
      logDebug("Page loaded.");
      logDebug("Ready. Add holdings or refresh saved portfolio.");

      portfolioHoldings = loadHoldingsFromStorage();

      if (portfolioHoldings.length) {
        loadDynamicPortfolio();
      } else {
        renderRows([]);
      }
    });
  </script>
</body>
</html>
