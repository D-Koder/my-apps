<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Portfolio Tracker</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 24px;
    }

    h1 {
      margin-bottom: 6px;
    }

    h3 {
      margin-top: 0;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .card {
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 18px;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #020617;
      color: #e5e7eb;
      min-width: 150px;
    }

    button {
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #1d4ed8;
    }

    button.secondary {
      background: #475569;
    }

    button.secondary:hover {
      background: #334155;
    }

    button.danger {
      background: #dc2626;
    }

    button.danger:hover {
      background: #b91c1c;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid #1e293b;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #020617;
      min-width: 1150px;
    }

    th,
    td {
      padding: 11px;
      border-bottom: 1px solid #1e293b;
      text-align: left;
      font-size: 14px;
      white-space: nowrap;
    }

    th {
      background: #1e293b;
      color: #cbd5e1;
    }

    tr:hover {
      background: #111827;
    }

    .ok {
      color: #22c55e;
      font-weight: bold;
    }

    .bad {
      color: #ef4444;
      font-weight: bold;
    }

    .warn {
      color: #facc15;
      font-weight: bold;
    }

    .small {
      color: #94a3b8;
      font-size: 12px;
    }

    pre {
      white-space: pre-wrap;
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 12px;
      color: #cbd5e1;
      overflow-x: auto;
      max-height: 320px;
    }
  </style>
</head>

<body>
  <h1>Portfolio Tracker</h1>

  <div class="subtitle">
    Dynamic holdings + Cloudflare Worker + EODHD symbol resolver.
  </div>

  <div class="card">
    <h3>Add / Update Holding</h3>

    <div class="controls">
      <input id="holdingSymbol" placeholder="Symbol e.g. AIXA.DE" />
      <input id="holdingShares" placeholder="Shares e.g. 33" type="number" step="0.0001" />
      <input id="holdingAvgCost" placeholder="Avg cost e.g. 73.70" type="number" step="0.01" />

      <button onclick="addHolding()">Add / Update</button>
      <button class="secondary" onclick="refreshPortfolio()">Refresh Prices</button>
      <button class="danger" onclick="clearHoldings()">Clear Holdings</button>
      <button class="secondary" onclick="clearSymbolCache()">Clear Symbol Cache</button>
    </div>

    <p class="small">
      Worker: <span id="workerUrl"></span>
    </p>
  </div>

  <div class="card">
    <h3>Quick Symbol Test</h3>

    <div class="controls">
      <input id="testSymbol" placeholder="Example: AIXA.DE" value="AIXA.DE" />
      <button onclick="testSymbol()">Test Symbol</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Original</th>
          <th>Resolved</th>
          <th>Shares</th>
          <th>Avg Cost</th>
          <th>Price</th>
          <th>Market Value</th>
          <th>Cost Value</th>
          <th>P&amp;L</th>
          <th>Return</th>
          <th>Currency</th>
          <th>Source</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="portfolioBody">
        <tr>
          <td colspan="13" class="small">No holdings added yet.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <h3>Debug Log</h3>
  <pre id="debugLog"></pre>

  <script>
    /************************************************************
     * CONFIG
     ************************************************************/

    const WORKER_BASE = "https://lively-dew-5c3c.davidtrix7.workers.dev";

    document.getElementById("workerUrl").textContent = WORKER_BASE;

    let portfolioHoldings = loadHoldings();

    /************************************************************
     * GENERAL HELPERS
     ************************************************************/

    function normaliseSymbol(value) {
      return String(value || "").trim().toUpperCase();
    }

    function getTickerRoot(symbol) {
      return normaliseSymbol(symbol).split(".")[0];
    }

    function log(message, data = null) {
      const box = document.getElementById("debugLog");
      const time = new Date().toLocaleTimeString();

      box.textContent += `[${time}] ${message}\n`;

      if (data !== null) {
        box.textContent += JSON.stringify(data, null, 2) + "\n";
      }

      box.textContent += "\n";
      box.scrollTop = box.scrollHeight;
    }

    function clearLog() {
      document.getElementById("debugLog").textContent = "";
    }

    function fmtMoney(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "—";
      return n.toFixed(2);
    }

    function fmtPrice(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "—";
      return n.toFixed(4);
    }

    function fmtPercent(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "—";
      return n.toFixed(2) + "%";
    }

    function unwrapQuoteResponse(response) {
      if (!response || typeof response !== "object") return null;

      if (response.data && typeof response.data === "object") {
        return response.data;
      }

      return response;
    }

    function getPriceFromQuote(response) {
      const data = unwrapQuoteResponse(response);
      if (!data) return null;

      const raw =
        data.close ??
        data.price ??
        data.last ??
        data.previousClose ??
        data.adjusted_close ??
        data.adjustedClose ??
        null;

      const n = Number(raw);

      if (!Number.isFinite(n) || n <= 0) {
        return null;
      }

      return n;
    }

    function getCurrencyFromQuote(response) {
      if (!response || typeof response !== "object") return "—";

      const data = unwrapQuoteResponse(response);

      return (
        data?.currency ??
        data?.Currency ??
        data?.currencyCode ??
        data?.CurrencyCode ??
        response?.currency ??
        response?.Currency ??
        response?.currencyCode ??
        response?.CurrencyCode ??
        "—"
      );
    }

    function isValidQuote(response) {
      return getPriceFromQuote(response) !== null;
    }

    /************************************************************
     * HOLDINGS STORAGE
     ************************************************************/

    function loadHoldings() {
      try {
        return JSON.parse(localStorage.getItem("portfolioHoldings") || "[]");
      } catch {
        return [];
      }
    }

    function saveHoldings() {
      localStorage.setItem("portfolioHoldings", JSON.stringify(portfolioHoldings));
    }

    function addHolding() {
      const symbol = normaliseSymbol(document.getElementById("holdingSymbol").value);
      const shares = Number(document.getElementById("holdingShares").value);
      const avgCost = Number(document.getElementById("holdingAvgCost").value);

      if (!symbol) {
        alert("Enter a symbol, e.g. AIXA.DE");
        return;
      }

      if (!Number.isFinite(shares) || shares <= 0) {
        alert("Enter valid shares.");
        return;
      }

      if (!Number.isFinite(avgCost) || avgCost < 0) {
        alert("Enter valid average cost.");
        return;
      }

      const existing = portfolioHoldings.find(
        h => normaliseSymbol(h.symbol) === symbol
      );

      if (existing) {
        existing.shares = shares;
        existing.avgCost = avgCost;
      } else {
        portfolioHoldings.push({ symbol, shares, avgCost });
      }

      saveHoldings();

      document.getElementById("holdingSymbol").value = "";
      document.getElementById("holdingShares").value = "";
      document.getElementById("holdingAvgCost").value = "";

      refreshPortfolio();
    }

    function removeHolding(symbol) {
      portfolioHoldings = portfolioHoldings.filter(
        h => normaliseSymbol(h.symbol) !== normaliseSymbol(symbol)
      );

      saveHoldings();
      refreshPortfolio();
    }

    function clearHoldings() {
      portfolioHoldings = [];
      saveHoldings();
      renderRows([]);
      clearLog();
      log("Holdings cleared.");
    }

    /************************************************************
     * SYMBOL MAPPING CACHE
     ************************************************************/

    function loadSymbolCache() {
      try {
        return JSON.parse(localStorage.getItem("symbolMapCache") || "{}");
      } catch {
        return {};
      }
    }

    function saveSymbolCache(cache) {
      localStorage.setItem("symbolMapCache", JSON.stringify(cache));
    }

    function getCachedSymbolInfo(original) {
      const cache = loadSymbolCache();
      const value = cache[normaliseSymbol(original)];

      if (!value) return null;

      // Backwards compatibility if old cache was just a string
      if (typeof value === "string") {
        return {
          resolved: normaliseSymbol(value),
          currency: "—"
        };
      }

      return {
        resolved: normaliseSymbol(value.resolved),
        currency: value.currency || "—"
      };
    }

    function setCachedSymbolInfo(original, resolved, currency = "—") {
      const cache = loadSymbolCache();

      cache[normaliseSymbol(original)] = {
        resolved: normaliseSymbol(resolved),
        currency: currency || "—"
      };

      saveSymbolCache(cache);
    }

    function clearSymbolCache() {
      localStorage.removeItem("symbolMapCache");
      clearLog();
      log("Symbol cache cleared.");
    }

    /************************************************************
     * WORKER FETCHERS
     ************************************************************/

    async function fetchWorker(path) {
      const url = `${WORKER_BASE}${path}`;
      log("Fetch: " + url);

      const res = await fetch(url);

      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }

      return await res.json();
    }

    async function fetchQuote(symbol) {
      return await fetchWorker(
        `/quote?symbol=${encodeURIComponent(normaliseSymbol(symbol))}`
      );
    }

    async function searchSymbol(query) {
      return await fetchWorker(
        `/search?q=${encodeURIComponent(normaliseSymbol(query))}`
      );
    }

    /************************************************************
     * EXCHANGE HINTS
     ************************************************************/

    function getExchangeHints(originalSymbol) {
      const s = normaliseSymbol(originalSymbol);

      if (s.endsWith(".DE")) return ["XETRA", "F"];
      if (s.endsWith(".L")) return ["LSE"];
      if (s.endsWith(".PA")) return ["PA"];
      if (s.endsWith(".AS")) return ["AS"];
      if (s.endsWith(".SW")) return ["SW"];
      if (s.endsWith(".TO")) return ["TO"];
      if (s.endsWith(".V")) return ["V"];
      if (s.endsWith(".T")) return ["TSE", "T"];
      if (s.endsWith(".HK")) return ["HK"];
      if (s.endsWith(".AX")) return ["AU", "AX"];

      return [];
    }

    /************************************************************
     * SEARCH RESULT HANDLING
     ************************************************************/

    function getSearchArray(searchResult) {
      if (Array.isArray(searchResult)) return searchResult;
      if (Array.isArray(searchResult?.data)) return searchResult.data;
      if (Array.isArray(searchResult?.results)) return searchResult.results;
      return [];
    }

    function normaliseSearchItem(item) {
      const code = normaliseSymbol(
        item.Code ??
        item.code ??
        item.Symbol ??
        item.symbol ??
        ""
      );

      const exchange = normaliseSymbol(
        item.Exchange ??
        item.exchange ??
        item.ExchangeCode ??
        item.exchangeCode ??
        ""
      );

      const name = String(
        item.Name ??
        item.name ??
        item.Description ??
        item.description ??
        ""
      ).toUpperCase();

      const type = String(
        item.Type ??
        item.type ??
        ""
      ).toUpperCase();

      const country = String(
        item.Country ??
        item.country ??
        ""
      ).toUpperCase();

      const currency = String(
        item.Currency ??
        item.currency ??
        ""
      ).toUpperCase();

      const isPrimary =
        item.isPrimary === true ||
        item.IsPrimary === true ||
        item.primary === true;

      const eodhdSymbol = code && exchange ? `${code}.${exchange}` : code;

      return {
        code,
        exchange,
        name,
        type,
        country,
        currency,
        isPrimary,
        eodhdSymbol,
        raw: item
      };
    }

    function pickBestSymbol(originalSymbol, searchResult) {
      const original = normaliseSymbol(originalSymbol);
      const root = getTickerRoot(original);
      const hints = getExchangeHints(original);

      const candidates = getSearchArray(searchResult)
        .map(normaliseSearchItem)
        .filter(x => x.code || x.eodhdSymbol);

      log("Search candidates for " + original, candidates);

      if (!candidates.length) return null;

      // 1. Exact match
      let best = candidates.find(x => x.eodhdSymbol === original);
      if (best) return best;

      // 2. Same root + expected exchange from original suffix
      best = candidates.find(x =>
        x.code === root &&
        hints.some(h => x.exchange === h)
      );
      if (best) return best;

      // 3. Same root + exchange contains hint
      best = candidates.find(x =>
        x.code === root &&
        hints.some(h => x.exchange.includes(h))
      );
      if (best) return best;

      // 4. Same root + primary listing
      best = candidates.find(x =>
        x.code === root &&
        x.isPrimary === true
      );
      if (best) return best;

      // 5. Same root + common preferred exchanges
      const preferred = [
        "XETRA",
        "LSE",
        "TSE",
        "HK",
        "SW",
        "PA",
        "AS",
        "TO",
        "AU",
        "AX",
        "F"
      ];

      best = candidates.find(x =>
        x.code === root &&
        preferred.includes(x.exchange)
      );
      if (best) return best;

      // 6. Same root, any exchange
      best = candidates.find(x => x.code === root);
      if (best) return best;

      // 7. Final fallback
      return candidates[0];
    }

    /************************************************************
     * SYMBOL RESOLUTION
     ************************************************************/

    async function resolveSymbol(originalSymbol) {
      const original = normaliseSymbol(originalSymbol);

      if (!original) {
        throw new Error("Empty symbol");
      }

      // 1. Cache first
      const cached = getCachedSymbolInfo(original);

      if (cached && cached.resolved) {
        log(`Using cache: ${original} → ${cached.resolved}`);

        return {
          original,
          resolved: cached.resolved,
          currency: cached.currency || "—",
          source: "cache"
        };
      }

      // 2. Try direct quote first
      try {
        const direct = await fetchQuote(original);

        if (isValidQuote(direct)) {
          const directCurrency = getCurrencyFromQuote(direct);

          setCachedSymbolInfo(original, original, directCurrency);

          log(`Direct worked: ${original}`, direct);

          return {
            original,
            resolved: original,
            currency: directCurrency,
            source: "direct"
          };
        }

        log(`Direct invalid for ${original}`, direct);
      } catch (err) {
        log(`Direct failed for ${original}: ${err.message}`);
      }

      // 3. Search by root
      const root = getTickerRoot(original);
      const search = await searchSymbol(root);
      const mappedInfo = pickBestSymbol(original, search);

      if (!mappedInfo) {
        log(`No mapping found. Using original: ${original}`);

        return {
          original,
          resolved: original,
          currency: "—",
          source: "fallback"
        };
      }

      // 4. Confirm mapped quote works
      try {
        const mappedQuote = await fetchQuote(mappedInfo.eodhdSymbol);

        if (isValidQuote(mappedQuote)) {
          const quoteCurrency = getCurrencyFromQuote(mappedQuote);
          const finalCurrency =
            quoteCurrency !== "—"
              ? quoteCurrency
              : mappedInfo.currency || "—";

          setCachedSymbolInfo(original, mappedInfo.eodhdSymbol, finalCurrency);

          log(`Mapped confirmed: ${original} → ${mappedInfo.eodhdSymbol}`, mappedQuote);

          return {
            original,
            resolved: mappedInfo.eodhdSymbol,
            currency: finalCurrency,
            source: "search"
          };
        }

        log(`Mapped invalid: ${mappedInfo.eodhdSymbol}`, mappedQuote);
      } catch (err) {
        log(`Mapped failed: ${mappedInfo.eodhdSymbol}: ${err.message}`);
      }

      return {
        original,
        resolved: original,
        currency: "—",
        source: "fallback"
      };
    }

    async function getSmartQuote(originalSymbol) {
      const resolvedInfo = await resolveSymbol(originalSymbol);
      const quote = await fetchQuote(resolvedInfo.resolved);

      const quoteCurrency = getCurrencyFromQuote(quote);
      const finalCurrency =
        quoteCurrency !== "—"
          ? quoteCurrency
          : resolvedInfo.currency || "—";

      return {
        originalSymbol: resolvedInfo.original,
        resolvedSymbol: resolvedInfo.resolved,
        source: resolvedInfo.source,
        quote,
        price: getPriceFromQuote(quote),
        currency: finalCurrency
      };
    }

    /************************************************************
     * TABLE RENDERING
     ************************************************************/

    function setMessage(message) {
      document.getElementById("portfolioBody").innerHTML = `
        <tr>
          <td colspan="13" class="small">${message}</td>
        </tr>
      `;
    }

    function renderRows(rows) {
      const tbody = document.getElementById("portfolioBody");

      if (!rows.length) {
        tbody.innerHTML = `
          <tr>
            <td colspan="13" class="small">No holdings added yet.</td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = rows.map(row => {
        const pnlClass =
          row.pnl > 0 ? "ok" :
          row.pnl < 0 ? "bad" :
          "";

        const statusClass = row.ok ? "ok" : "bad";

        return `
          <tr>
            <td>${row.originalSymbol}</td>
            <td>${row.resolvedSymbol || "—"}</td>
            <td>${row.shares ?? "—"}</td>
            <td>${fmtMoney(row.avgCost)}</td>
            <td>${fmtPrice(row.price)}</td>
            <td>${fmtMoney(row.marketValue)}</td>
            <td>${fmtMoney(row.costValue)}</td>
            <td class="${pnlClass}">${fmtMoney(row.pnl)}</td>
            <td class="${pnlClass}">${fmtPercent(row.returnPct)}</td>
            <td>${row.currency || "—"}</td>
            <td>${row.source || "—"}</td>
            <td class="${statusClass}">${row.status}</td>
            <td>
              <button class="danger" onclick="removeHolding('${row.originalSymbol}')">
                Remove
              </button>
            </td>
          </tr>
        `;
      }).join("");
    }

    /************************************************************
     * MAIN ACTIONS
     ************************************************************/

    async function refreshPortfolio() {
      clearLog();

      portfolioHoldings = loadHoldings();

      if (!portfolioHoldings.length) {
        renderRows([]);
        log("No holdings found.");
        return;
      }

      setMessage("Loading portfolio prices...");

      const rows = [];

      for (const holding of portfolioHoldings) {
        const symbol = normaliseSymbol(holding.symbol);
        const shares = Number(holding.shares);
        const avgCost = Number(holding.avgCost);
        const costValue = shares * avgCost;

        try {
          const result = await getSmartQuote(symbol);
          const price = result.price;

          const marketValue =
            price !== null ? price * shares : null;

          const pnl =
            marketValue !== null ? marketValue - costValue : null;

          const returnPct =
            pnl !== null && costValue > 0 ? (pnl / costValue) * 100 : null;

          rows.push({
            originalSymbol: result.originalSymbol,
            resolvedSymbol: result.resolvedSymbol,
            shares,
            avgCost,
            price,
            marketValue,
            costValue,
            pnl,
            returnPct,
            currency: result.currency,
            source: result.source,
            ok: price !== null,
            status: price !== null ? "OK" : "No valid price"
          });
        } catch (err) {
          rows.push({
            originalSymbol: symbol,
            resolvedSymbol: "—",
            shares,
            avgCost,
            price: null,
            marketValue: null,
            costValue,
            pnl: null,
            returnPct: null,
            currency: "—",
            source: "error",
            ok: false,
            status: err.message
          });

          log(`Error loading ${symbol}: ${err.message}`);
        }

        renderRows(rows);
      }

      log("Refresh complete.");
    }

    async function testSymbol() {
      clearLog();

      const symbol = normaliseSymbol(document.getElementById("testSymbol").value);

      if (!symbol) {
        alert("Enter a symbol first.");
        return;
      }

      setMessage("Testing " + symbol + "...");

      try {
        const result = await getSmartQuote(symbol);

        renderRows([
          {
            originalSymbol: result.originalSymbol,
            resolvedSymbol: result.resolvedSymbol,
            shares: "—",
            avgCost: null,
            price: result.price,
            marketValue: null,
            costValue: null,
            pnl: null,
            returnPct: null,
            currency: result.currency,
            source: result.source,
            ok: result.price !== null,
            status: result.price !== null ? "OK" : "No valid price"
          }
        ]);

        log("Test result", result);
      } catch (err) {
        setMessage("Test failed: " + err.message);
        log("Test failed: " + err.message);
      }
    }

    /************************************************************
     * PAGE LOAD
     ************************************************************/

    window.addEventListener("load", () => {
      log("Page loaded.");

      portfolioHoldings = loadHoldings();

      if (portfolioHoldings.length) {
        refreshPortfolio();
      } else {
        renderRows([]);
      }
    });
  </script>
</body>
</html>
